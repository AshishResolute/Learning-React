<!doctype html>
<html>
  <head>
    <title>Chatbot</title>
  </head>
  <body>
    <div class="js-container"></div>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script type="text/babel">
      function ChatInput({currentChatMessages, setChatMessages}) {
        const [inputText, setInputText] = React.useState("");
        function saveInputText(event) {
          setInputText(event.target.value);
        }
        function sendMessage() {
          setChatMessages([
            ...currentChatMessages,
            { message: inputText, sender: "user", id: crypto.randomUUID() },
          ]);
        }
        return (
          <>
            <input
              placeholder="Send a message to chatbot"
              onChange={saveInputText}
            />
            <button onClick={sendMessage}>Send</button>
          </>
        );
      }

      function ChatMessage({ message, sender }) {
        if (sender === "user")
          return (
            <div>
              <span>{message}</span>
              <img src="./userImg.jfif" alt="user pfp" width="30" />
            </div>
          );
        return (
          <div>
            <img src="ai.jfif" alt="ai bot image" width="30" />
            <span>{message}</span>
          </div>
        );
      }

      function ChatMessages({ currentChatMessages, setChatMessages }) {
        // or just use let [currentChatMessages,setChatMessages] = React.useState()

        // using array destructuring
        // const [currentChatMessages,setChatMessages]=state
        function sendMessageByButton() {
          setChatMessages([
            ...currentChatMessages,
            {
              message: "Testing event Handler",
              sender: "user",
              id: crypto.randomUUID,
            },
          ]);
        }
        return (
          <>
            <button onClick={sendMessageByButton}>SendMessage</button>
            {currentChatMessages.map((details) => (
              <ChatMessage
                message={details.message}
                sender={details.sender}
                id={details.id}
              />
            ))}
          </>
        );
      }
      function App() {
        let state = React.useState([
          { message: "Hello chatbot", sender: "user", id: crypto.randomUUID() },
          {
            message: "Hello,How can i help You",
            sender: "bot",
            id: crypto.randomUUID(),
          },
        ]);
        const currentChatMessages = state[0];
        const setChatMessages = state[1];
        return (
          <>
            <ChatInput
              currentChatMessages={currentChatMessages}
              setChatMessages={setChatMessages}
            />
            <ChatMessages
              currentChatMessages={currentChatMessages}
              setChatMessages={setChatMessages}
            />
          </>
        );
      }
      const container = document.querySelector(".js-container");

      ReactDOM.createRoot(container).render(<App />);
    </script>
  </body>
</html>
